version: '3'
services:
  postgres:
    build: 
      context: .
      args:
        POSTGRES_DB: ${POSTGRES_DB}
        POSTGRES_SCHEMA: ${POSTGRES_SCHEMA}
        CUSTOM_USER: ${CUSTOM_USER}
        CUSTOM_PASSWORD: ${CUSTOM_PASSWORD}
    env_file:
      - .env
    ports:
      - "5432:5432"
    networks:
      - app-network

  app:
    build:
      context: ./src
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    networks:
      - app-network

networks:
  app-network: