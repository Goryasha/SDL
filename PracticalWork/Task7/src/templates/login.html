<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <style>
        .error { color: red; font-weight: bold; margin-bottom: 10px; }
        .hidden { display: none; }
        .success { color: green; }
    </style>
</head>
<body>
    <h2>Авторизация</h2>
    <div id="serverErrorBox" class="error hidden"></div>

    <form id="loginForm">
        <label>Имя пользователя: 
            <input type="text" name="username" required placeholder="Введите логин">
        </label><br><br>
        
        <label>Пароль: 
            <input type="password" name="password" id="passwordInput" required placeholder="Введите пароль">
        </label><br><br>
        
        <button type="submit">Войти</button>
    </form>

    <script>
        const form = document.getElementById('loginForm');
        const serverErrorBox = document.getElementById('serverErrorBox');
        const passwordInput = document.getElementById('passwordInput');

        function showError(element, message) {
            element.textContent = message;
            element.classList.remove('hidden');
            passwordInput.focus();
        }

        function clearError(element) {
            element.classList.add('hidden');
            element.textContent = '';
        }

        form.addEventListener('submit', async function(event) {
            event.preventDefault();
            
            clearError(serverErrorBox);

            const formData = new FormData(form);
            const username = formData.get('username').trim();
            const password = formData.get('password').trim();

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    console.log(errorData)
                    showError(serverErrorBox, errorData.message || 'Произошла ошибка на сервере.');
                    return;
                }

                if (response.status === 200) {
                    const redirectUrl = response.url;
                    if (redirectUrl) {
                        window.location.href = redirectUrl;
                        return;
                    }
                }

            } catch (error) {
                console.error('Ошибка сети:', error);
                showError(serverErrorBox, 'Не удалось связаться с сервером. Проверьте консоль.');
            }
        });
    </script>
</body>
</html>
