name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Go binary
        run: |
          cd ./PracticalWork/Task7/src
          CGO_ENABLED=0 GOOS=linux go build -o main.exe

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Images
        working-directory: ./PracticalWork/Task7
        run: docker compose build --pull

      - name: Start Application and DB via Docker Compose
        id: start_containers
        run: |
          echo "Starting services..."
          docker compose up -d
          echo "::set-output name::started"